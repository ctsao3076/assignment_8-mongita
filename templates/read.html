{% extends 'base.html' %}

{% block container %}
<h1>All Books </h1>
<a href='/add-book'>+ Add New Book</a>

<table>
  <tr>
    <th>Image</th>
    <th>Title</th>
    <th>Author</th>
    <th>ISBN</th>
    <th>Category</th>
    <th>Price</th>
    <th>Actions</th>
  </tr>
  {% for book in books %}
  <tr>
    <td><img src="{{ url_for('static', filename='images/books/' + book.image) }}" width="50"></td>
    <td>{{ book.title }}</td>
    <td>{{ book.author }}</td>
    <td>{{ book.isbn }}</td>
    <td>{{ book.categoryName }}</td>
    <td>${{ book.price }}</td>
    <td>
      <a href="/edit/{{ book.bookId }}">Edit</a> |
      <a href="/delete/{{ book.bookId }}">Delete</a>
    </td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
